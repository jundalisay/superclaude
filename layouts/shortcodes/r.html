{{ $a := .Get "a" | default "" }}
{{ $c := .Get "c" | default "" }}
{{ $imgSrc := printf "/icons/%s.jpg" $a }}


<div class="fly-in-right flex justify-end items-start gap-2 px-2 py-4 relative">
  <div class="flex flex-col items-end max-w-[calc(100%-3.5rem)] text-right">
    <div class="flex items-center space-x-2 rtl:space-x-reverse mb-1">
      <span class="text-sm font-semibold text-gray-900 dark:text-white">{{ $a }} {{ $c }}</span>
    </div>
    
    <div class="border-2 border-solid border-gray-200 dark:border-gray-600 p-4 bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white shadow-lg rounded-s-xl rounded-ee-xl">
      <div class="font-normal prose-sm dark:prose-invert">
        {{ .Inner | markdownify }}
      </div>
    </div>
  </div>

  <img class="w-14 h-14 rounded-full shadow-lg -ml-4 z-10 border-2 border-white dark:border-gray-800 object-cover" 
       src="{{ $imgSrc }}" 
       alt="{{ $a }}" 
       onerror="this.src='/icons/blank.jpg'">
</div>
