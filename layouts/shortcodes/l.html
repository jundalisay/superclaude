{{ $a := .Get "a" | default "" }}
{{ $imgName := printf "/icons/%s.jpg" $a }}

<div class="reveal-on-scroll fly-in-left flex justify-start items-start gap-3 px-2 py-4 relative"
     data-animate="show">
     
  <div class="flex-shrink-0">
    <img class="w-12 h-12 rounded-full shadow-lg border-2 border-white dark:border-gray-700 object-cover" 
         src="{{ $imgName }}" alt="{{ $a }}" 
         onerror="this.src='/icons/blank.jpg'">
  </div>

  <div class="flex flex-col items-start max-w-[75%] md:max-w-[60%]">
    <div class="flex items-center mb-1">
      <span class="text-xs font-semibold text-gray-600 dark:text-gray-400 ml-1">
        {{ $a }} {{ .Get "c" }}
      </span>
    </div>

    <div class="border border-gray-400 p-4 shadow-md rounded-2xl rounded-tl-none text-left">
      <div class="prose-sm dark:prose-invert">
        {{ .Inner | markdownify }}
      </div>
    </div>
  </div>
</div>
