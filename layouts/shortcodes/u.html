{{ $u := .Get "u" | default "" }}
{{ $d := .Get "d" | default "" }}

<details id="update" class="pl-6 pr-4 pb-4 mt-4 mb-2 bg-sp-card border border-sp-border shadow-md rounded-lg toc overflow-hidden" open data-sal="slide-right">
  <summary class="flex items-center font-bold py-3 cursor-pointer justify-between select-none text-sp-text hover:text-sp-muted transition-colors list-none [&::-webkit-details-marker]:hidden">
    <span>{{ i18n "update" }} {{ $d }}</span>
    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-chevron-down transition-transform duration-200 open:rotate-180" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </summary>
  <div class="pt-2 border-t border-sp-border">
    {{ $u | markdownify }}
  </div>
</details>
