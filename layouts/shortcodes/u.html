{{ $u := .Get "u" | default "" }}
{{ $d := .Get "d" | default "" }}

<details id="update" class="pl-6 pr-4 pb-4 mt-4 mb-2 bg-gray-50 dark:bg-gray-800 shadow-md rounded-lg toc overflow-hidden" open data-sal="slide-right">
  <summary class="flex items-center font-bold py-3 cursor-pointer justify-between select-none text-gray-900 dark:text-gray-100 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
    <span>{{ i18n "update" }} {{ $d }}</span>
    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-chevron-down transition-transform duration-200 group-open:rotate-180" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </summary>
  <div class="text-sm text-gray-700 dark:text-gray-300 pt-2 border-t border-gray-200 dark:border-gray-700">
    {{ $u | markdownify }}
  </div>
</details>
