{{ $t := .Get "t" | default "Details" }}

<details id="{{ $t | urlize }}" class="group shadow-lg border border-gray-300 mt-4 mb-4 rounded-xl overflow-hidden transition-all duration-300">
  <summary class="flex items-center justify-between list-none cursor-pointer p-4 select-none 
                 bg-gradient-to-r from-teal-700 to-teal-600 
                 hover:from-teal-500 hover:to-teal-400 
                 active:scale-[0.98] transition-all duration-200">
    
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full bg-teal-400 shadow-[0_0_8px_#2dd4bf] group-open:bg-blue-400"></div>
      <span class="font-display font-bold text-white tracking-wide uppercase text-sm">
        {{ $t | markdownify }}
      </span>
    </div>

    <div class="text-teal-400 group-open:rotate-180 transition-transform duration-300">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>
  </summary>

  <div class="p-6 font-body leading-relaxed animate-in fade-in slide-in-from-top-2 duration-300">
    {{ .Inner | markdownify }}
  </div>
</details>

<style>
  /* Standard browsers hide the default arrow, but Safari needs this */
  summary::-webkit-details-marker {
    display: none;
  }
</style>
