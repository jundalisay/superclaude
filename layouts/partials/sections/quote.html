{{ $q := .quote }}
{{ $alt := .alt }}
<section class="quote-section{{ if $alt }} alt{{ end }}">
  <div class="quote-container">
    <!-- Author icon -->
    {{ with $q.icon }}
    <div style="margin:0 auto 1.5rem;width:5rem;height:5rem;border-radius:9999px;overflow:hidden;border:3px solid transparent;background:linear-gradient(white,white) padding-box,linear-gradient(135deg,#0ea5e9,#14b8a6) border-box;box-shadow:0 0 20px rgba(14,165,233,0.3)">
      <img
        src="/icons/{{ . }}.jpg"
        alt="{{ $q.author }}"
        style="width:100%;height:100%;object-fit:cover"
        onerror="this.parentElement.innerHTML='<div style=width:100%;height:100%;background:linear-gradient(135deg,#0ea5e9,#14b8a6);display:flex;align-items:center;justify-content:center;color:white;font-size:1.5rem;font-weight:700>{{ (slice $q.author 0 1) }}</div>'"
      />
    </div>
    {{ end }}

    <span class="quote-marks">"</span>
    <p class="quote-text">{{ $q.content }}</p>

    <div class="quote-author">— {{ $q.author }}</div>
    {{ with $q.src }}<p class="quote-src">{{ . }}</p>{{ end }}
  </div>
</section>
