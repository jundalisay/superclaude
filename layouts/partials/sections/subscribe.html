<section class="subscribe-section">
  <h2 class="subscribe-title">{{ i18n "subscribe_title" }}</h2>
  <p class="subscribe-sub">{{ i18n "subscribe_sub" }}</p>

  <form class="subscribe-form" id="subscribe-form" novalidate>
    <input
      type="email"
      class="subscribe-input"
      placeholder="{{ i18n "subscribe_placeholder" }}"
      required
      aria-label="{{ i18n "subscribe_placeholder" }}"
    />
    <button type="submit" class="subscribe-btn">{{ i18n "subscribe_btn" }}</button>
  </form>
</section>
