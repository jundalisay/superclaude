{{ $panels := .Site.Language.Params.panels }}
<section class="panels-section">
  <div class="container-lg">
    <h2 class="section-title">{{ $panels.title }}</h2>

    <div class="cards-grid">
      {{ range $panels.cards }}
      <a href="{{ .url }}" class="card-img">
        <img
          src="{{ .img }}"
          alt="{{ .title }}"
          loading="lazy"
          onerror="this.style.background='linear-gradient(135deg,#0c1a2e,#0a1f1e)';this.style.objectFit='none'"
        />
        <div class="card-img-overlay"></div>
        <div class="card-img-title">
          {{ .title }}
          <div class="card-img-sub">{{ .sub }}</div>
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</section>
