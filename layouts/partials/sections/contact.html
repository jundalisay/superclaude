<section class="contact-section">
  <div class="container-lg" style="max-width:640px">
    <h2 class="section-title">{{ i18n "contact_title" }}</h2>
    <p style="text-align:center;color:#64748b;margin-bottom:2rem">{{ i18n "contact_sub" }}</p>

    <form class="contact-form" id="contact-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="contact-name">{{ i18n "contact_name" }}</label>
        <input type="text" class="form-input" id="contact-name" name="name" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="contact-email">{{ i18n "contact_email" }}</label>
        <input type="email" class="form-input" id="contact-email" name="email" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="contact-message">{{ i18n "contact_message" }}</label>
        <textarea class="form-textarea" id="contact-message" name="message" required></textarea>
      </div>
      <button type="submit" class="btn-primary" style="width:100%">{{ i18n "contact_send" }}</button>
    </form>
  </div>
</section>
