<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<title>{{ if .IsHome }}{{ i18n "site_name" }} — {{ i18n "site_tagline" }}{{ else }}{{ .Title }} | {{ i18n "site_name" }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ i18n "site_description" }}{{ end }}"/>

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }}"/>
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ i18n "site_description" }}{{ end }}"/>
{{ with .Params.image }}<meta property="og:image" content="{{ . | absURL }}"/>{{ end }}


<meta property="og:image" content="{{ with .Params.image }}{{ . | absURL }}{{ else }}{{ "/graphics/sp.jpg" | absURL }}{{ end }}"/>
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}"/>
<meta property="og:url" content="{{ .Permalink }}"/>

<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="{{ .Title }}"/>
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ i18n "site_description" }}{{ end }}"/>


<!-- Canonical -->
<link rel="canonical" href="{{ .Permalink }}"/>

<!-- Multilingual alternates -->
{{ range .AllTranslations }}
<link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}"/>
{{ end }}

<link rel="icon" type="image/png" href="/icons/sp.svg">
<link rel="apple-touch-icon" href="/icons/sp.svg">

<link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

<!-- Dark mode init (before render to prevent flash) -->
<script>
  (function() {
    var stored = localStorage.getItem('sp-theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (stored === 'dark' || (!stored && prefersDark)) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{{ if .IsPage }}Article{{ else }}WebSite{{ end }}",
  "headline": "{{ .Title }}",
  "url": "{{ .Permalink }}",
  "description": "{{ with .Description }}{{ . }}{{ else }}{{ i18n "site_description" }}{{ end }}",
  "author": {
    "@type": "Organization",
    "name": "Superphysics"
  }
}
</script>



<!-- Search index JSON -->
{{ if .IsHome }}
<link rel="alternate" type="application/json" href="{{ "index.json" | relURL }}"/>
{{ end }}

<!-- RSS -->
{{ range .AlternativeOutputFormats }}
<link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink }}" title="{{ $.Site.Title }}"/>
{{ end }}
