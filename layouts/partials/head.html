<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>

<title>{{ if .IsHome }}{{ i18n "site_name" }} — {{ i18n "site_tagline" }}{{ else }}{{ .Title }} | {{ i18n "site_name" }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ i18n "site_description" }}{{ end }}"/>

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }}"/>
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ i18n "site_description" }}{{ end }}"/>
{{ with .Params.image }}<meta property="og:image" content="{{ . | absURL }}"/>{{ end }}
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}"/>
<meta property="og:url" content="{{ .Permalink }}"/>

<!-- Canonical -->
<link rel="canonical" href="{{ .Permalink }}"/>

<!-- Multilingual alternates -->
{{ range .AllTranslations }}
<link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}"/>
{{ end }}

<link rel="icon" type="image/png" href="/icons/sp.svg">
<link rel="apple-touch-icon" href="/icons/sp.svg">

<!-- Tailwind v4 CDN -->
<link rel="stylesheet" href="/css/styles.css" />
<!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->

<!-- Dark mode init (before render to prevent flash) -->
<script>
  (function() {
    var stored = localStorage.getItem('sp-theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (stored === 'dark' || (!stored && prefersDark)) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>

<!-- Custom styles -->
<link rel="stylesheet" href="/css/custom.css"/>

<!-- Search index JSON -->
{{ if .IsHome }}
<link rel="alternate" type="application/json" href="{{ "index.json" | relURL }}"/>
{{ end }}

<!-- RSS -->
{{ range .AlternativeOutputFormats }}
<link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink }}" title="{{ $.Site.Title }}"/>
{{ end }}



<script>
  // for fly in 

  document.addEventListener("DOMContentLoaded", () => {
  const observerOptions = {
    threshold: 0.15, // Trigger when 15% of the element is visible
    rootMargin: "0px 0px -50px 0px" // Slight offset so it feels like it triggers 'late'
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add("show");
        // Optional: Unobserve after showing to prevent repeat animations
        observer.unobserve(entry.target);
      }
    });
  }, observerOptions);

  // Select all elements with our hook class
  const hiddenElements = document.querySelectorAll(".reveal-on-scroll");
  hiddenElements.forEach((el) => observer.observe(el));
});
</script>
