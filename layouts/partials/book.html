<section class="py-24 bg-slate-950 z-20 relative border-y border-white/5">
    <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center gap-16">
        <div class="w-full md:w-1/2 flex justify-center">
            <img src="{{ .img }}" alt="Book Cover" class="rounded-lg shadow-2xl shadow-teal-500/20 w-64 md:w-80 transform -rotate-2 hover:rotate-0 transition-transform duration-500">
        </div>
        <div class="w-full md:w-1/2 text-center md:text-left">
            <h2 class="text-4xl font-bold text-white mb-6">{{ .intro }}</h2>

                {{ .sub | safeHTML }}

            <a href="{{ .url }}" target="_blank" class="inline-flex items-center gap-3 px-8 py-4 bg-white text-slate-950 font-bold rounded-xl hover:bg-teal-400 transition-colors">
