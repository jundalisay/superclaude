<div class="search-overlay" id="search-overlay" role="dialog" aria-label="{{ i18n "search_title" }}">
  <div class="search-box" style="position:relative">
    <button class="icon-btn search-close" id="search-close" aria-label="Close search">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="search-input-wrap">
      <span class="search-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="{{ i18n "search_placeholder" }}"
        autocomplete="off"
        autofocus
      />
    </div>
    <div class="search-results" id="search-results" role="listbox">
      <p style="color:#64748b;font-size:0.875rem;padding:0.5rem">{{ i18n "search_placeholder" }}</p>
    </div>
  </div>
</div>
