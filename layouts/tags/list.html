{{ define "main" }}
<section class="bg-gradient-to-br from-slate-900 via-blue-950/70 to-teal-950/50 py-16 relative overflow-hidden">
  <div class="absolute inset-0 opacity-[0.06]" style="background-image: linear-gradient(#0d9488 1px, transparent 1px), linear-gradient(90deg, #0d9488 1px, transparent 1px); background-size: 40px 40px;"></div>
  <div class="relative max-w-[1400px] mx-auto px-6">
    <h1 class="font-display font-bold text-4xl md:text-5xl text-white mb-3">{{ i18n "tags_title" }}</h1>
  </div>
</section>
<section class="py-16 max-w-[1400px] mx-auto px-6">
  <div class="flex flex-wrap gap-3">
    {{ range .Data.Terms.Alphabetical }}
    <a href="{{ .Page.RelPermalink }}"
       class="card-reveal flex items-center gap-2 px-4 py-2 rounded-full bg-sp-card border border-sp-border
              hover:border-teal-500 hover:text-teal-600 hover:shadow-md transition-all font-display text-sm font-medium text-sp-text">
      <span>#{{ .Page.Title }}</span>
      <span class="text-xs text-sp-muted bg-sp-bg-alt px-1.5 py-0.5 rounded-full">{{ .Count }}</span>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
