{{ define "main" }}
<section class="py-20 bg-sp-bg">
  <div class="max-w-[1400px] mx-auto px-6">
    
    <!-- Page header from _index.md -->
    <div class="text-center mb-12">
      <h1 class="font-display text-4xl md:text-5xl font-bold text-sp-text mb-4">{{ .Title }}</h1>
      {{ with .Description }}
      <p class="text-sp-muted text-lg max-w-3xl mx-auto">{{ . | safeHTML }}</p>
      {{ end }}
      
      <!-- Optional YouTube video -->
      {{ with .Params.youtube }}
      <div class="mt-8 max-w-2xl mx-auto">
        <div class="aspect-w-16 aspect-h-9">
          <iframe src="https://www.youtube.com/embed/{{ . }}" 
                  frameborder="0" 
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                  allowfullscreen
                  class="w-full h-full rounded-xl"></iframe>
        </div>
      </div>
      {{ end }}
    </div>

    <!-- Proofs/Evidence cards grid -->
    {{ with .Params.proofs }}
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
      {{ range . }}
        {{ partial "proof.html" . }}
      {{ end }}
    </div>
    {{ end }}
    
  </div>
</section>
{{ end }}
