{{ define "main" }}
<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <title>404 - Page Not Found | {{ .Site.Title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            /*background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);*/
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border: 1px solid rgba(45, 212, 191, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #2dd4bf 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        
        h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
        }
        
        p {
            font-size: 1.125rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #2dd4bf, #3b82f6);
            border-radius: 9999px;
            transition: all 0.2s ease;
            box-shadow: 0 10px 15px -3px rgba(45, 212, 191, 0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(45, 212, 191, 0.3);
        }
        
        .btn svg {
            width: 1.25rem;
            height: 1.25rem;
            transition: transform 0.2s ease;
        }
        
        .btn:hover svg {
            transform: translateX(4px);
        }
        
        .error-details {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #64748b;
        }
        
        /* Floating orbs animation */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
        }
        
        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(45, 212, 191, 0.15);
            top: -100px;
            left: -100px;
            animation: float 20s ease-in-out infinite;
        }
        
        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.15);
            bottom: -150px;
            right: -150px;
            animation: float 25s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 20px); }
        }
    </style>
</head>
<body>
    <!-- Background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    
    <div class="container">
        <h1>404</h1>
        <h2>That page is missing!</h2>
        
        <p>We are reorganizing the content so we suggest to search for that topic or browse the index.</p>

        <p>Search for that topic here:
            <!-- Search button in content area -->
            <button id="contentSearchBtn" 
                    aria-label="Search" 
                    class="inline-flex items-center gap-2 p-4 p-2 bg-teal-600 hover:bg-teal-500 text-white rounded-xl transition-colors shadow-sm hover:shadow-md">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              <span>Search articles</span>
            </button>
        </p>

        <p>Or contact us at pantrypoints@gmail.com</p>


        <a href="{{ "/" | relLangURL }}" class="btn">
            Return Home
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-house-icon lucide-house"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </a>
        
    </div>
</body>
</html>
{{ end }}
