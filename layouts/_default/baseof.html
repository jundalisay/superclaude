<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}"{{ if .Site.Language.Params.rtl }} dir="rtl"{{ end }} class="scroll-smooth">
<head>
  {{ partial "head.html" . }}
</head>
<body class="bg-sp-bg text-sp-text transition-colors duration-300 min-h-screen flex flex-col">
  {{ partial "navbar.html" . }}

  <main class="flex-1">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <!-- Scroll to top button -->
  <button id="scrollTopBtn"
    aria-label="{{ i18n "back_to_top" }}"
    class="fixed bottom-6 left-6 z-50 w-12 h-12 rounded-full bg-teal-600 text-white shadow-lg
           flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300
           hover:bg-teal-500 hover:scale-110 focus:outline-none focus:ring-2 focus:ring-teal-400">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <!-- Search overlay -->
  <div id="searchOverlay" class="fixed inset-0 z-[100] bg-black/70 backdrop-blur-sm hidden items-center justify-start pt-20 px-4">
    <div class="w-full max-w-2xl mx-auto">
      <div class="bg-sp-card rounded-2xl shadow-2xl overflow-hidden border border-sp-border">
        <div class="flex items-center gap-3 px-5 py-4 border-b border-sp-border">
          <svg class="w-5 h-5 text-teal-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input id="searchInput" type="text" placeholder="{{ i18n "nav_search_placeholder" }}"
            class="flex-1 bg-transparent text-sp-text text-lg outline-none placeholder-sp-muted"/>
          <button id="closeSearch" class="text-sp-muted hover:text-sp-text p-1 rounded">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div id="searchResults" class="max-h-[60vh] overflow-y-auto divide-y divide-sp-border"></div>
      </div>
    </div>
  </div>

  <script src="/js/main.js" defer></script>
</body>
</html>
